name: Build MatchBet Pro APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Capacitor CLI and dependencies
      run: |
        npm install -g @capacitor/cli@5.7.0
        npm install

    - name: Add Android platform
      run: |
        npx cap add android

    - name: Copy web assets to Android
      run: |
        npx cap copy android

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Make gradlew executable
      run: chmod +x android/gradlew

    - name: Customize app name and icon color
      run: |
        # Set app name
        sed -i 's/app_name">.*</app_name">MatchBet Pro</g' android/app/src/main/res/values/strings.xml || true
        echo "App name set"

    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MatchBet-Pro-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Show APK info
      run: |
        ls -lh android/app/build/outputs/apk/debug/
        echo "✅ APK built successfully!"
